name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/extension/package-lock.json
      - run: uv sync --all-groups --locked
      - run: npm ci
        working-directory: apps/extension
      - run: npx playwright install --with-deps --no-shell chromium
        working-directory: apps/extension
      - name: Match tag to package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("apps/server/pyproject.toml", "rb"))["project"]["version"])')"
          test "$RELEASE_TAG" = "v$package_version"
      - run: uv run python scripts/validate_static.py
      - run: uv run python scripts/build_release.py
      - run: uv run python scripts/validate_release.py
      - run: uv run python scripts/check_release_reproducible.py
      - name: Verify tracked generated files are unchanged
        run: git diff --exit-code -- apps/extension/dist
      - name: Upload complete release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: release/
          if-no-files-found: error
      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: |
            release/*.whl
            release/*.tar.gz
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build-and-verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release
      - name: Verify checksums
        run: sha256sum -c SHA256SUMS
        working-directory: release
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber
          else
            gh release create "$RELEASE_TAG" release/* --verify-tag --generate-notes --title "Chrome Bridge $RELEASE_TAG"
          fi

  pypi-publish:
    name: Publish server and SDK distributions to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chrome-bridge-sdk
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
