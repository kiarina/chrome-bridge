name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/extension/package-lock.json
      - run: uv sync --all-groups --locked
      - run: npm ci
        working-directory: apps/extension
      - run: npx playwright install --with-deps --no-shell chromium
        working-directory: apps/extension
      - name: Match tag to package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("packages/mcp/pyproject.toml", "rb"))["project"]["version"])')"
          test "$RELEASE_TAG" = "v$package_version"
      - run: uv run python scripts/validate_static.py
      - run: uv run python scripts/build_release.py
      - run: uv run python scripts/validate_release.py
      - run: uv run python scripts/check_release_reproducible.py
      - name: Verify tracked generated files are unchanged
        run: git diff --exit-code -- apps/extension/dist
      - name: Upload complete release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: release/
          if-no-files-found: error
      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: |
            release/*.whl
            release/*.tar.gz
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build-and-verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release
      - name: Verify checksums
        run: sha256sum -c SHA256SUMS
        working-directory: release
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber
          else
            gh release create "$RELEASE_TAG" release/* --verify-tag --generate-notes --title "Chrome Bridge $RELEASE_TAG"
          fi

  pypi-publish:
    name: Publish server and SDK distributions to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chrome-bridge-sdk
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist
      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  chrome-web-store-publish:
    name: Publish extension through Chrome Web Store API v2
    needs: pypi-publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: chrome-web-store
      url: https://chromewebstore.google.com/detail/chrome-bridge/ogmocgobegbjbecakclahodnhhfmccad
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Download verified release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release
      - name: Verify checksums
        run: sha256sum -c SHA256SUMS
        working-directory: release
      - name: Authenticate as the Store service account
        id: google-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.CWS_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.CWS_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 900s
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore
      - name: Upload, submit, and enable publication after approval
        env:
          CHROME_WEB_STORE_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          CHROME_WEB_STORE_PUBLISHER_ID: 2e079875-55db-4c84-ba1f-0a083549945a
          CHROME_WEB_STORE_ITEM_ID: ogmocgobegbjbecakclahodnhhfmccad
        run: |
          extension_zips=(release/chrome-bridge-extension-*.zip)
          test "${#extension_zips[@]}" -eq 1
          python scripts/chrome_web_store.py submit \
            --extension-zip "${extension_zips[0]}" \
            --publish-type DEFAULT_PUBLISH \
            --deploy-percentage 100
