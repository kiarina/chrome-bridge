[project]
name = "chrome-bridge-sdk"
version = "0.3.0"
description = "Python SDK for the shared Chrome Bridge service"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
    "chrome-bridge-mcp>=0.3,<0.4",
    "httpx2>=2,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=8.4,<9",
    "pytest-asyncio>=1.1,<2",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/chrome_bridge_sdk"]

[tool.hatch.build.targets.sdist]
exclude = ["/tests"]
